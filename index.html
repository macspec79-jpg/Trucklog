<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trucker Pro NL</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#27ae60">

<style>
:root{
--green:#00ff41;
--bg:#121212;
--card:#1e1e1e;
--border:#333;
--orange:#ff9800;
--blue:#007bff;
--red:#ff5252;
--purple:#6a1b9a;
}

body{
font-family:-apple-system, sans-serif;
background:var(--bg);
color:#eee;
margin:0;
padding-bottom:180px;
}

.tabs{
display:flex;
background:#000;
position:sticky;
top:0;
z-index:100;
border-bottom:1px solid var(--border);
}

.tab{
flex:1;
padding:15px;
text-align:center;
color:#888;
font-weight:bold;
cursor:pointer;
text-transform:uppercase;
font-size:.7em;
}

.tab.active{
color:var(--green);
border-bottom:3px solid var(--green);
background:#1a1a1a;
}

.container{
padding:15px;
max-width:600px;
margin:auto;
}

.page{display:none;}
.page.active{display:block;}

.card{
background:var(--card);
padding:15px;
border-radius:12px;
border:1px solid var(--border);
margin-bottom:20px;
}

input,select,textarea{
background:#000;
border:1px solid var(--border);
color:var(--green);
padding:12px;
border-radius:8px;
font-weight:bold;
width:100%;
box-sizing:border-box;
font-size:16px;
margin-bottom:10px;
}

label{
font-size:.7em;
color:#888;
text-transform:uppercase;
margin-bottom:4px;
display:block;
margin-top:5px;
}

.day-block{
background:#262626;
border-radius:8px;
padding:12px;
margin-bottom:12px;
border-left:4px solid #444;
}

.day-header{
font-weight:bold;
color:var(--green);
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

.input-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
}

.input-group{
display:flex;
flex-direction:column;
text-align:center;
}

.summary{
background:#000;
padding:15px;
border-radius:10px;
border:1px solid var(--green);
}

.line{
display:flex;
justify-content:space-between;
margin:6px 0;
font-size:.9em;
}

.net-total{
font-size:1.8em;
color:var(--green);
font-weight:900;
border-top:1px solid #333;
padding-top:10px;
margin-top:10px;
}

.small-hours{
font-size:.7em;
color:#888;
text-align:center;
margin-bottom:10px;
}

.action-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:15px;
border-top:1px solid var(--border);
display:flex;
flex-direction:column;
gap:10px;
z-index:200;
}

.btn{
padding:15px;
border-radius:8px;
font-weight:bold;
border:none;
cursor:pointer;
text-transform:uppercase;
}

.btn-main{background:var(--blue);color:white;}
.btn-request{background:var(--purple);color:white;}
.btn-install{background:var(--green);color:black;}
</style>
</head>

<body>

<div class="tabs">
<div class="tab active" onclick="showPage('logPage',this)">Hours</div>
<div class="tab" onclick="showPage('payrollPage',this)">Requests</div>
<div class="tab" onclick="showPage('historyPage',this)">History</div>
</div>

<div class="container">

<!-- Hours Page -->
<div id="logPage" class="page active">

<div class="small-hours" id="totalHours">Total Hours: 0</div>

<div class="card">
<input type="text" id="driverName" placeholder="DRIVER NAME" oninput="saveAndCalc()">
<label>WEEK ENDING</label>
<input type="date" id="weekEnding" oninput="saveAndCalc()">
</div>

<div id="logContainer"></div>

<div class="summary">
<div class="line"><span>Weekly Gross:</span><span id="outGross">$0.00</span></div>
<div class="line"><span>Tax:</span><span id="outTax">$0.00</span></div>
<div class="line"><span>CPP/EI:</span><span id="outCpp">$0.00</span></div>
<div class="line"><span>Fixed:</span><span id="outFixed">-$184.01</span></div>

<div class="line net-total">
<span>Net Pay:</span>
<span id="outNet">$0.00</span>
</div>

<div id="projection" style="font-size:.8em;color:#888;text-align:center;margin-top:10px;">
Projected Annual Net: $0
</div>

<div id="taxDetails" style="font-size:.65em;color:#777;text-align:center;margin-top:5px;">
Est. Effective Rate: 0% | Top Bracket: 36.3%
</div>

<button class="btn btn-main" onclick="resetHours()">Reset Hours</button>

</div>

<!-- Payroll Requests Page -->
<div id="payrollPage" class="page">
<div class="card">

<h3 style="color:var(--green); margin:0 0 10px 0;">Payouts & Requests</h3>

<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
<div>
<label>Current Bank Hours</label>
<input type="number" id="curBank" value="0" oninput="saveAndCalc()">
</div>

<div>
<label>Sick Days Remaining</label>
<input type="number" id="curSick" value="10" oninput="saveAndCalc()">
</div>
</div>

<label>Add To Bank (Hours)</label>
<input type="number" id="bankIn" placeholder="0.0" oninput="saveAndCalc()">

<label>Bank Payout (Hours)</label>
<input type="number" id="payOut" placeholder="0.0" oninput="saveAndCalc()">

<label>Vacation Pay Request ($)</label>
<input type="number" id="vacPayout" placeholder="0.00" oninput="saveAndCalc()">

<label>Vacation Request Date</label>
<input type="date" id="vacDate" oninput="saveAndCalc()">

<label>Sick Day Request Date</label>
<input type="date" id="sickDate" oninput="saveAndCalc()">

<label>Notes / Dispatch Info</label>
<textarea id="payrollNotes" rows="2" placeholder="Unit numbers, delays, etc." oninput="saveAndCalc()"></textarea>

<button class="btn btn-request" onclick="sendReport(true)">
📧 Email Requests Only
</button>

</div>
</div>

<!-- History Page -->
<div id="historyPage" class="page">
<div class="card">

<label>YTD Base Gross</label>
<input type="number" id="ytdBase" value="0" oninput="saveAndCalc()">

<div id="ytdTotal" style="color:var(--green);font-weight:bold;">
Total YTD: $0
</div>

<button class="btn btn-main" onclick="resetHistory()">Reset History</button>

</div>
</div>

</div>

<!-- Action Bar -->
<div class="action-bar">

<button class="btn btn-install" id="installBtn" style="display:none">
Install App
</button>

<button class="btn btn-main" onclick="sendReport(false)">
📧 Email Full Report
</button>

</div>

<script>

const RATE=25.75;
const FIXED_DED=184.01;
let deferredPrompt;

// PWA install prompt
window.addEventListener('beforeinstallprompt',(e)=>{
    e.preventDefault();
    deferredPrompt=e;
    document.getElementById('installBtn').style.display='block';
});

document.getElementById('installBtn').addEventListener('click', async()=>{
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    const choice = await deferredPrompt.userChoice;
    if(choice.outcome==='accepted'){
        document.getElementById('installBtn').style.display='none';
    }
    deferredPrompt=null;
});

function showPage(pId,el){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById(pId).classList.add('active');
    el.classList.add('active');
}

function init(){
    const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const cont=document.getElementById('logContainer');
    days.forEach(day=>{
        cont.innerHTML+=`
        <div class="day-block">
            <div class="day-header">${day}</div>
            <div class="input-grid">
                <div class="input-group"><label>Reg</label><input type="number" class="val-reg" oninput="saveAndCalc()"></div>
                <div class="input-group"><label>1.5x</label><input type="number" class="val-ot" oninput="saveAndCalc()"></div>
                <div class="input-group"><label>2.0x</label><input type="number" class="val-dt" oninput="saveAndCalc()"></div>
            </div>
        </div>`;
    });
}

function saveAndCalc(){
    let r=0, ot=0, dt=0;
    document.querySelectorAll('.day-block').forEach(b=>{
        r+=parseFloat(b.querySelector('.val-reg').value)||0;
        ot+=parseFloat(b.querySelector('.val-ot').value)||0;
        dt+=parseFloat(b.querySelector('.val-dt').value)||0;
    });

    const bIn = parseFloat(document.getElementById('bankIn').value)||0;
    const bOut = parseFloat(document.getElementById('payOut').value)||0;
    const vPay = parseFloat(document.getElementById('vacPayout').value)||0;
    const gross = (r+bOut-bIn)*RATE + ot*RATE*1.5 + dt*RATE*2 + vPay;
    const ann = gross*52;

    const tax = ann*0.25/52;
    const cpp = gross*0.05;
    const net = gross - tax - cpp - FIXED_DED;

    document.getElementById('outGross').innerText="$"+gross.toFixed(2);
    document.getElementById('outTax').innerText="-$"+tax.toFixed(2);
    document.getElementById('outCpp').innerText="-$"+cpp.toFixed(2);
    document.getElementById('outNet').innerText="$"+net.toFixed(2);

    document.getElementById('totalHours').innerText="Total Hours: "+(r+ot+dt).toFixed(2);

    const ytd = parseFloat(document.getElementById('ytdBase').value)||0;
    document.getElementById('ytdTotal').innerText=`Total YTD: $${(ytd+gross).toFixed(2)}`;
}

function sendReport(reqOnly){
    const name = document.getElementById('driverName').value;
    const week = document.getElementById('weekEnding').value;
    const bIn = document.getElementById('bankIn').value;
    const bOut = document.getElementById('payOut').value;
    const vPay = document.getElementById('vacPayout').value;
    const vacDate = document.getElementById('vacDate').value;
    const sickDate = document.getElementById('sickDate').value;
    const notes = document.getElementById('payrollNotes').value;

    let subject = reqOnly ? `Payroll Request - ${name}` : `Log - ${name} - ${week}`;

    let body = `NAME: ${name}\nWEEK: ${week}\n\n`;

    if(bIn) body += `BANKING IN: ${bIn} hours\n`;
    if(bOut) body += `BANK PAYOUT: ${bOut} hours\n`;
    if(vPay) body += `VACATION PAYOUT: $${vPay}\n`;
    if(vacDate) body += `VACATION DATE: ${vacDate}\n`;
    if(sickDate) body += `SICK DAY: ${sickDate}\n`;
    if(notes) body += `NOTES: ${notes}\n`;

    if(!reqOnly){
        body += `EST. GROSS: ${document.getElementById('outGross').innerText}\n`;
        body += `EST. NET: ${document.getElementById('outNet').innerText}\n`;
    }

    window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function resetHours(){
    if(confirm("Reset all hours for this week?")){
        document.querySelectorAll('.val-reg, .val-ot, .val-dt').forEach(i=>i.value="");
        document.getElementById('bankIn').value="";
        document.getElementById('payOut').value="";
        document.getElementById('vacPayout').value="";
        document.getElementById('vacDate').value="";
        document.getElementById('sickDate').value="";
        document.getElementById('payrollNotes').value="";
        saveAndCalc();
    }
}

function resetHistory(){
    if(confirm("Reset YTD History?")){
        document.getElementById('ytdBase').value=0;
        document.getElementById('ytdTotal').innerText="Total YTD: $0";
    }
}

init();

if('serviceWorker' in navigator){
    navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
