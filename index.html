<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trucker Pro NL - 2026</title>
    <style>
        :root { --green: #00ff41; --bg: #121212; --card: #1e1e1e; --border: #333; --orange: #ff9800; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #eee; padding: 10px; margin: 0; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; max-width: 600px; margin: auto; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .top-info { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .top-info input, .top-info label { background: #000; border: 1px solid var(--border); color: var(--green); padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; box-sizing: border-box; }
        .date-label { font-size: 0.7em; color: #888; text-transform: uppercase; margin-bottom: 4px; display: block; }

        .day-block { background: #262626; border-radius: 8px; padding: 12px; margin-bottom: 12px; border-left: 4px solid #444; }
        .day-header { font-weight: bold; color: var(--green); margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 0.9em; align-items: center; }
        .unit-select { background: #000; border: 1px solid var(--green); color: var(--green); padding: 6px; border-radius: 4px; width: 90px; font-weight: bold; font-size: 0.9em; cursor: pointer; }
        
        .dt-highlight { border-left-color: var(--orange) !important; }
        .dt-highlight .day-header { color: var(--orange); }
        .dt-highlight .unit-select { border-color: var(--orange); color: var(--orange); }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; text-align: center; }
        .input-group label { font-size: 0.6em; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        
        input[type="number"], input[type="date"], input[type="text"] { background: #000; border: 1px solid var(--border); color: var(--green); padding: 10px; border-radius: 6px; text-align: center; font-size: 1.1em; width: 100%; box-sizing: border-box; }
        .notes-input { background: #1a1a1a; border: 1px solid #333; color: #ccc; width: 100%; padding: 8px; border-radius: 4px; font-size: 0.8em; margin-top: 5px; box-sizing: border-box; text-align: left; }

        .summary { background: #000; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid var(--green); }
        .line { display: flex; justify-content: space-between; margin: 6px 0; font-size: 0.85em; }
        .tax-line { color: #ff5252; }
        .hr-breakdown { color: #888; font-style: italic; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 8px; }
        .total-hours-line { color: var(--green); font-weight: bold; margin-bottom: 4px; }
        .net-total { font-size: 1.7em; color: var(--green); font-weight: 900; border-top: 1px solid #333; padding-top: 10px; margin-top: 10px; }
        
        .btn-email { background: #007bff; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 15px; font-size: 1em; cursor: pointer; }
        .btn-clear { background: transparent; color: #555; border: none; width: 100%; margin-top: 20px; cursor: pointer; font-size: 0.75em; text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <div class="top-info">
        <input type="text" id="driverName" placeholder="Driver Name" oninput="saveStatic()">
        <div>
            <label class="date-label">Week Ending (Saturday):</label>
            <input type="date" id="weekEnding" oninput="saveStatic()">
        </div>
    </div>
    
    <div id="logContainer"></div>

    <div class="summary">
        <div class="line total-hours-line"><span>Total Weekly Hours:</span> <span id="outTotalHrs">0.0 hrs</span></div>
        <div class="line hr-breakdown">
            <span>Reg: <b id="sumReg">0</b></span>
            <span>1.5x: <b id="sumOt">0</b></span>
            <span>2.0x: <b id="sumDt">0</b></span>
        </div>
        <div class="line"><span>Gross Pay:</span> <span id="outGross">$0.00</span></div>
        <div class="line tax-line"><span>Income Tax (NL/Fed):</span> <span id="outTax">-$0.00</span></div>
        <div class="line tax-line"><span>CPP & EI (7.58%):</span> <span id="outCpp">-$0.00</span></div>
        <div class="line tax-line"><span>Union & RRSP (7.5%):</span> <span id="outUnion">-$0.00</span></div>
        <div class="line net-total"><span>Net Take Home:</span> <span id="outNet">$0.00</span></div>
    </div>

    <button class="btn-email" onclick="sendReport()">📧 Email Report</button>
    <button class="btn-clear" onclick="clearData()">Clear All Data</button>
</div>

<script>
const RATE = 25.75;
const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

function init() {
    const container = document.getElementById('logContainer');
    days.forEach((day) => {
        const isDTDay = (day === "Friday" || day === "Saturday") ? "dt-highlight" : "";
        let options = '<option value="N/A">Unit #</option>';
        for(let i=1; i<=15; i++) options += `<option value="${i}">${i}</option>`;

        container.innerHTML += `
            <div class="day-block ${isDTDay}">
                <div class="day-header"><span>${day}</span><select class="unit-select" onchange="calc()">${options}</select></div>
                <div class="input-grid">
                    <div class="input-group"><label>Reg</label><input type="number" class="val-reg" oninput="calc()"></div>
                    <div class="input-group"><label>1.5x</label><input type="number" class="val-ot" oninput="calc()"></div>
                    <div class="input-group"><label>2.0x</label><input type="number" class="val-dt" oninput="calc()"></div>
                </div>
                <input type="text" class="notes-input" placeholder="Notes (Route, delays, etc.)" oninput="calc()">
            </div>`;
    });
    
    const today = new Date();
    const saturdayOffset = (6 - today.getDay() + 7) % 7;
    const saturdayDate = new Date(today);
    saturdayDate.setDate(today.getDate() + saturdayOffset);
    document.getElementById('weekEnding').value = saturdayDate.toISOString().split('T')[0];

    loadData();
}

function calc() {
    let gross = 0, totalHrs = 0, sReg = 0, sOt = 0, sDt = 0;
    const entries = [];
    document.querySelectorAll('.day-block').forEach(block => {
        const r = parseFloat(block.querySelector('.val-reg').value) || 0;
        const o = parseFloat(block.querySelector('.val-ot').value) || 0;
        const d = parseFloat(block.querySelector('.val-dt').value) || 0;
        const unit = block.querySelector('.unit-select').value;
        const note = block.querySelector('.notes-input').value;
        
        sReg += r; sOt += o; sDt += d;
        totalHrs += (r + o + d);
        gross += (r * RATE) + (o * RATE * 1.5) + (d * RATE * 2);
        entries.push({r, o, d, unit, note});
    });

    localStorage.setItem('truckerHoursFinal_V3', JSON.stringify(entries));

    const taxable = Math.max(0, gross - 530); 
    const incomeTax = taxable * 0.227; 
    const cppEi = gross * 0.0758;
    const unionRRSP = gross * 0.075;
    const net = gross - incomeTax - cppEi - unionRRSP;

    document.getElementById('outTotalHrs').innerText = totalHrs.toFixed(1) + " hrs";
    document.getElementById('sumReg').innerText = sReg.toFixed(1);
    document.getElementById('sumOt').innerText = sOt.toFixed(1);
    document.getElementById('sumDt').innerText = sDt.toFixed(1);
    document.getElementById('outGross').innerText = "$" + gross.toFixed(2);
    document.getElementById('outTax').innerText = "-$" + incomeTax.toFixed(2);
    document.getElementById('outCpp').innerText = "-$" + cppEi.toFixed(2);
    document.getElementById('outUnion').innerText = "-$" + unionRRSP.toFixed(2);
    document.getElementById('outNet').innerText = "$" + net.toFixed(2);
}

function saveStatic() {
    localStorage.setItem('driverName', document.getElementById('driverName').value);
    localStorage.setItem('weekEnding', document.getElementById('weekEnding').value);
}

function loadData() {
    document.getElementById('driverName').value = localStorage.getItem('driverName') || "";
    const savedDate = localStorage.getItem('weekEnding');
    if (savedDate) document.getElementById('weekEnding').value = savedDate;
    
    const saved = localStorage.getItem('truckerHoursFinal_V3');
    if (saved) {
        const entries = JSON.parse(saved);
        const blocks = document.querySelectorAll('.day-block');
        entries.forEach((data, i) => {
            if(blocks[i]) {
                blocks[i].querySelector('.val-reg').value = data.r || "";
                blocks[i].querySelector('.val-ot').value = data.o || "";
                blocks[i].querySelector('.val-dt').value = data.d || "";
                blocks[i].querySelector('.unit-select').value = data.unit || "N/A";
                blocks[i].querySelector('.notes-input').value = data.note || "";
            }
        });
        calc();
    }
}

function clearData() {
    if(confirm("Wipe all data?")) {
        localStorage.removeItem('truckerHoursFinal_V3');
        location.reload();
    }
}

function sendReport() {
    const driver = document.getElementById('driverName').value || "Driver";
    const date = document.getElementById('weekEnding').value;
    const totalHrs = document.getElementById('outTotalHrs').innerText;
    
    let body = `WEEKLY HOURS REPORT\n--------------------------\n`;
    body += `Driver: ${driver}\nWeek Ending: ${date}\nTotal Hours: ${totalHrs}\n`;
    body += `Breakdown: Reg: ${document.getElementById('sumReg').innerText}, OT: ${document.getElementById('sumOt').innerText}, DT: ${document.getElementById('sumDt').innerText}\n`;
    body += `--------------------------\n\n`;
    
    document.querySelectorAll('.day-block').forEach(block => {
        const d = block.querySelector('.day-header span').innerText;
        const unit = block.querySelector('.unit-select').value;
        const r = block.querySelector('.val-reg').value || 0;
        const o = block.querySelector('.val-ot').value || 0;
        const dt = block.querySelector('.val-dt').value || 0;
        const note = block.querySelector('.notes-input').value;
        if(r > 0 || o > 0 || dt > 0) {
            body += `${d} (Unit #${unit}): ${r} Reg, ${o} OT, ${dt} Double\n`;
            if(note) body += `   Note: ${note}\n`;
        }
    });
    
    body += `\n--------------------------\nGross Total: ${document.getElementById('outGross').innerText}`;
    
    const subject = `Hours Report - ${driver} - W/E ${date}`;
    window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}
init();
</script>
</body>
</html>
