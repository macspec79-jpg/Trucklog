<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruckLog NL Pro</title>
<style>
:root {
    --primary: #2c3e50;
    --secondary: #27ae60;
    --accent: #2980b9;
    --bg: #f4f7f6;
    --danger: #e74c3c;
}

body {
    font-family: -apple-system, system-ui, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 15px;
    padding-bottom: 50px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    margin-bottom: 15px;
}

h1, h2 {
    color: var(--primary);
    margin: 0 0 15px 0;
}

label {
    display: block;
    margin: 10px 0 5px;
    font-weight: bold;
    font-size: 0.8rem;
    color: #555;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 1rem;
    margin-bottom: 5px;
}

textarea { resize: vertical; }

button {
    cursor: pointer;
}

.btn {
    background: var(--secondary);
    color: white;
    border: none;
    padding: 15px;
    width: 100%;
    border-radius: 8px;
    font-weight: bold;
    margin-top: 10px;
}

.btn-sm {
    padding: 8px 12px;
    margin: 2px;
    font-size: 0.9rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    color: white;
}

.tab-buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.tab-buttons button {
    flex: 1;
    padding: 12px;
    font-weight: bold;
    border-radius: 8px;
    border: none;
    color: white;
}

.tab-buttons button.active { background: var(--primary); }
.tab-buttons button.inactive { background: #7f8c8d; }

.history-item {
    border-left: 4px solid var(--accent);
    padding: 12px;
    margin-bottom: 10px;
    background: #fafafa;
    font-size: 0.85rem;
    border-radius: 0 8px 8px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.manual-fields {
    display: none;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
}

@media (max-width:600px){
    .manual-fields { grid-template-columns: 1fr; }
    input, select, textarea { font-size:1.05rem; padding:16px; }
    .btn { font-size:1.1rem; padding:16px; }
}
</style>
</head>
<body>

<h1 style="text-align:center;">🚛 TruckLog NL Pro</h1>

<div class="tab-buttons">
    <button id="tabShiftsBtn" class="active" onclick="showTab('shifts')">Shifts & Pay</button>
    <button id="tabBankBtn" class="inactive" onclick="showTab('bank')">Bank/Sick Requests</button>
</div>

<!-- Shifts & Pay Section -->
<div id="shifts" style="display:block;">

    <div class="card">
        <h2>Log New Shift</h2>

        <label>Date</label>
        <input type="date" id="dateInput">

        <label>Truck Number</label>
        <select id="truckNum">
            <option value="">Select Truck</option>
            <script>
                for(let i=1;i<=15;i++){
                    document.write(`<option value="${i}">${i}</option>`);
                }
            </script>
        </select>

        <div style="margin:10px 0; font-size:0.9rem; display:flex; align-items:center; gap:8px;">
            <strong>Manual Entry</strong>
            <input type="checkbox" id="manualToggle" onchange="toggleManual()">
        </div>

        <div id="autoInputSection">
            <label>Total Hours Worked</label>
            <input type="number" id="hoursInput" step="0.25" placeholder="0.00">
        </div>

        <div id="manualInputSection" class="manual-fields">
            <div><label>Reg</label><input type="number" id="manualReg" placeholder="0"></div>
            <div><label>OT</label><input type="number" id="manualOT" placeholder="0"></div>
            <div><label>DT</label><input type="number" id="manualDT" placeholder="0"></div>
        </div>

        <button class="btn" onclick="saveShift()">Save Shift</button>
    </div>

    <div class="card" style="background:#2c3e50; color:white;">
        <h2>Weekly Net Pay Estimator</h2>
        <div id="paySummary" style="font-size:0.9rem; margin-top:15px; border-top:1px solid #555; padding-top:10px;">
            Results will appear here...
        </div>
    </div>

    <div class="card">
        <h2>History (Last 7 Shifts)</h2>
        <div id="historyList"></div>
    </div>

</div>

<!-- Bank/Sick Requests Section -->
<div id="bank" style="display:none;">
    <div class="card">
        <h2>Bank Hours / Sick Requests</h2>
        <label>Banked Hours:</label>
        <input type="number" id="bankHours" placeholder="0">

        <label>Sick Days:</label>
        <input type="number" id="sickDays" placeholder="0">

        <label>Request Message:</label>
        <textarea id="requestMsg" rows="4" placeholder="Enter your request"></textarea>

        <button class="btn" onclick="sendRequest()">Send to Supervisor</button>
    </div>
</div>

<script>
let history = JSON.parse(localStorage.getItem('trucker_history')) || [];
document.getElementById('dateInput').valueAsDate = new Date();

// Tab functionality
function showTab(tab){
    if(tab==='shifts'){
        document.getElementById('shifts').style.display='block';
        document.getElementById('bank').style.display='none';
        document.getElementById('tabShiftsBtn').classList.add('active');
        document.getElementById('tabShiftsBtn').classList.remove('inactive');
        document.getElementById('tabBankBtn').classList.remove('active');
        document.getElementById('tabBankBtn').classList.add('inactive');
    } else {
        document.getElementById('shifts').style.display='none';
        document.getElementById('bank').style.display='block';
        document.getElementById('tabShiftsBtn').classList.remove('active');
        document.getElementById('tabShiftsBtn').classList.add('inactive');
        document.getElementById('tabBankBtn').classList.add('active');
        document.getElementById('tabBankBtn').classList.remove('inactive');
    }
}

// Manual entry toggle
function toggleManual(){
    const isManual = document.getElementById('manualToggle').checked;
    document.getElementById('autoInputSection').style.display = isManual ? 'none':'block';
    document.getElementById('manualInputSection').style.display = isManual ? 'grid':'none';
}

// Save shift
function saveShift(){
    const date = document.getElementById('dateInput').value;
    const truckNum = document.getElementById('truckNum').value;
    if(!truckNum) return alert("Select Truck Number");

    const isManual = document.getElementById('manualToggle').checked;
    let reg=0, ot=0, dt=0, total=0;

    if(isManual){
        reg = parseFloat(document.getElementById('manualReg').value)||0;
        ot = parseFloat(document.getElementById('manualOT').value)||0;
        dt = parseFloat(document.getElementById('manualDT').value)||0;
        total = reg+ot+dt;
    } else {
        total = parseFloat(document.getElementById('hoursInput').value)||0;
        if(total>9){ reg=9; ot=total-9; dt=0; } else { reg=total; ot=0; dt=0; }
    }

    if(total===0) return alert("Enter hours");
    history.unshift({date, truckNum, reg, ot, dt, total});
    if(history.length>7) history.pop();
    localStorage.setItem('trucker_history', JSON.stringify(history));
    updateUI();

    document.getElementById('hoursInput').value='';
    document.getElementById('manualReg').value='';
    document.getElementById('manualOT').value='';
    document.getElementById('manualDT').value='';
    document.getElementById('truckNum').value='';
}

// Remove individual shift
function removeShift(index){
    history.splice(index,1);
    localStorage.setItem('trucker_history', JSON.stringify(history));
    updateUI();
}

// Update UI and pay calculator
function updateUI(){
    const list = document.getElementById('historyList');
    list.innerHTML='';
    let wReg=0,wOT=0,wDT=0;

    history.forEach((s,i)=>{
        list.innerHTML+=`
        <div class="history-item">
            <div><strong>${s.date}</strong> | Truck ${s.truckNum}<br>R:${s.reg} | OT:${s.ot} | D:${s.dt}</div>
            <button class="btn-sm" style="background:${'#e74c3c'};" onclick="removeShift(${i})">Remove</button>
        </div>`;
        wReg+=s.reg; wOT+=s.ot; wDT+=s.dt;
    });

    const rate=25.75;
    const gross=(wReg*rate)+(wOT*rate*1.5)+(wDT*rate*2);

    // Newfoundland tax and CPP/EI
    const federalRate = 0.15;
    const provincialRate = 0.087;
    const cppRate = 0.057;
    const eiRate = 0.016;

    const taxAmount = gross*(federalRate+provincialRate);
    const cpp = gross*cppRate;
    const ei = gross*eiRate;
    const net = gross-taxAmount-cpp-ei;

    document.getElementById('paySummary').innerHTML=`
        <strong>Weekly Gross:</strong> $${gross.toFixed(2)}<br>
        <strong>Federal+Prov Tax:</strong> -$${taxAmount.toFixed(2)}<br>
        <strong>CPP:</strong> -$${cpp.toFixed(2)}<br>
        <strong>EI:</strong> -$${ei.toFixed(2)}<br>
        <hr style="border:0; border-top:1px solid #555;">
        <strong style="color:#27ae60; font-size:1.1rem;">Net Take-Home: $${net.toFixed(2)}</strong>
    `;
}

// Send bank/sick request via mailto
function sendRequest(){
    const bank = document.getElementById('bankHours').value || 0;
    const sick = document.getElementById('sickDays').value || 0;
    const msg = document.getElementById('requestMsg').value || '';
    const subject = encodeURIComponent('Bank/Sick Request');
    const body = encodeURIComponent(`Banked Hours: ${bank}\nSick Days: ${sick}\nMessage: ${msg}`);
    window.location.href = `mailto:supervisor@example.com?subject=${subject}&body=${body}`;
}

updateUI();
</script>

</body>
</html>
