<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>White Fleet Daily Log</title>

<link rel="manifest" href="manifest.json">

<style>
:root {
    --primary:#2c3e50;
    --secondary:#27ae60;
    --accent:#2980b9;
    --bg:#f4f7f6;
    --danger:#e74c3c;
}

body {
    font-family:-apple-system,system-ui,sans-serif;
    background:var(--bg);
    margin:0;
    padding:15px;
}

.dark {
    --bg:#1e272e;
    --primary:#ecf0f1;
}

.card {
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 4px 6px rgba(0,0,0,0.05);
    margin-bottom:15px;
}

.dark .card {
    background:#2f3640;
    color:white;
}

h1,h2 { margin:0 0 15px 0; }

label { font-weight:bold; font-size:0.8rem; }

input,select,textarea {
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-bottom:8px;
}

button { cursor:pointer; }

.btn {
    background:var(--secondary);
    color:white;
    border:none;
    padding:12px;
    width:100%;
    border-radius:8px;
    margin-top:10px;
}

.history-item {
    background:#fafafa;
    padding:10px;
    margin-bottom:8px;
    border-left:4px solid var(--accent);
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:0.85rem;
}

.dark .history-item { background:#3d3d3d; }

.btn-sm {
    background:var(--danger);
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
}
</style>
</head>
<body>

<h1 style="text-align:center;">White Fleet Daily Log</h1>

<div class="card">
<h2>Settings</h2>

<label>Hourly Rate</label>
<input type="number" id="rateInput" step="0.01" value="25.75">

<label>Supervisor Email</label>
<input type="email" id="supervisorEmail">

<div>
<input type="checkbox" id="autoBankToggle"> Auto Bank Overtime
</div>

<div>
<input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()"> Dark Mode
</div>
</div>

<div class="card">
<h2>Log New Shift</h2>

<label>Date</label>
<input type="date" id="dateInput">

<label>Truck Number</label>
<select id="truckNum">
<option value="">Select Truck</option>
</select>

<label>Total Hours</label>
<input type="number" id="hoursInput" step="0.25">

<button class="btn" onclick="saveShift()">Save Shift</button>
</div>

<div class="card" style="background:#2c3e50;color:white;">
<h2>Weekly Net Pay Estimator</h2>
<div id="paySummary">Results will appear here...</div>
</div>

<div class="card">
<h2>History</h2>
<div id="historyList"></div>
<button class="btn" style="background:#e74c3c;" onclick="resetWeek()">Reset Week</button>
<button class="btn" style="background:#2980b9;" onclick="exportCSV()">Export CSV</button>
</div>

<script>

// ---------- STORAGE ----------
let history = JSON.parse(localStorage.getItem('trucker_history')) || [];
let bankHistory = JSON.parse(localStorage.getItem('trucker_bank_history')) || [];

// ---------- INITIAL ----------
document.getElementById('dateInput').valueAsDate = new Date();

const truckSelect = document.getElementById('truckNum');
for (let i=1;i<=15;i++){
    const opt=document.createElement("option");
    opt.value=i;
    opt.textContent=i;
    truckSelect.appendChild(opt);
}

loadSettings();
updateUI();

// ---------- SAVE SHIFT ----------
function saveShift(){
    const date=document.getElementById('dateInput').value;
    const truck=document.getElementById('truckNum').value;
    const total=parseFloat(document.getElementById('hoursInput').value)||0;
    if(!truck||!total) return alert("Enter truck and hours");

    let reg=0,ot=0;
    if(total>9){ reg=9; ot=total-9; }
    else reg=total;

    history.unshift({date,truck,reg,ot,total});
    if(history.length>7) history.pop();
    localStorage.setItem('trucker_history',JSON.stringify(history));

    if(document.getElementById('autoBankToggle').checked && ot>0){
        bankHistory.unshift({weekEnding:date,bankHrs:ot});
        localStorage.setItem('trucker_bank_history',JSON.stringify(bankHistory));
    }

    document.getElementById('hoursInput').value='';
    updateUI();
}

// ---------- UPDATE UI ----------
function updateUI(){
    const list=document.getElementById('historyList');
    list.innerHTML='';
    let wReg=0,wOT=0;

    history.forEach((s,i)=>{
        list.innerHTML+=`
        <div class="history-item">
        <div><strong>${s.date}</strong> | Truck ${s.truck}<br>R:${s.reg} OT:${s.ot}</div>
        <button class="btn-sm" onclick="removeShift(${i})">Remove</button>
        </div>`;
        wReg+=s.reg;
        wOT+=s.ot;
    });

    const rate=parseFloat(document.getElementById('rateInput').value)||25.75;
    const gross=(wReg*rate)+(wOT*rate*1.5);

    const tax=gross*(0.15+0.087);
    const cpp=gross*0.0595;
    const ei=gross*0.0166;
    const union=gross*0.025;
    const net=gross-tax-cpp-ei-union;

    document.getElementById('paySummary').innerHTML=`
    Gross: $${gross.toFixed(2)}<br>
    Tax: -$${tax.toFixed(2)}<br>
    CPP: -$${cpp.toFixed(2)}<br>
    EI: -$${ei.toFixed(2)}<br>
    Union (2.5%): -$${union.toFixed(2)}<hr>
    <strong style="color:#27ae60;">Net: $${net.toFixed(2)}</strong>`;
}

function removeShift(i){
    history.splice(i,1);
    localStorage.setItem('trucker_history',JSON.stringify(history));
    updateUI();
}

function resetWeek(){
    if(confirm("Clear this week's shifts?")){
        history=[];
        localStorage.removeItem('trucker_history');
        updateUI();
    }
}

function exportCSV(){
    let csv="Date,Truck,Reg,OT,Total\n";
    history.forEach(s=>{
        csv+=`${s.date},${s.truck},${s.reg},${s.ot},${s.total}\n`;
    });
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download="weekly_log.csv";
    a.click();
}

// ---------- SETTINGS ----------
function loadSettings(){
    rateInput.value=localStorage.getItem('rate')||25.75;
    supervisorEmail.value=localStorage.getItem('email')||'';
    autoBankToggle.checked=localStorage.getItem('autoBank')==='true';
    darkModeToggle.checked=localStorage.getItem('darkMode')==='true';
    if(darkModeToggle.checked) document.body.classList.add("dark");
}

rateInput.oninput=saveSettings;
supervisorEmail.oninput=saveSettings;
autoBankToggle.onchange=saveSettings;
darkModeToggle.onchange=saveSettings;

function saveSettings(){
    localStorage.setItem('rate',rateInput.value);
    localStorage.setItem('email',supervisorEmail.value);
    localStorage.setItem('autoBank',autoBankToggle.checked);
    localStorage.setItem('darkMode',darkModeToggle.checked);
}

function toggleDarkMode(){
    document.body.classList.toggle("dark");
}

</script>
</body>
</html>
